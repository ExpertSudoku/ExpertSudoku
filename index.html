<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <!-- viewport-fit=cover makes env(safe-area-inset-*) report real values
         on notched devices (used by --discord-top-inset, site-theme.css). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1b1b1e" />
    <meta name="description" content="One sudoku a day in three difficulties - Medium, Expert and Hell. Play in the browser or as a Discord Activity with live shared progress and streaks." />
    <!-- Social previews (og-image.png is rendered by scripts/generate-og-image.mjs).
         URLs are absolute: scrapers resolve them without loading the page. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ExpertSudoku" />
    <meta property="og:title" content="ExpertSudoku — one grid a day" />
    <meta property="og:description" content="One sudoku a day in three difficulties - Medium, Expert and Hell. Play in the browser or as a Discord Activity with live shared progress and streaks." />
    <meta property="og:url" content="https://expertsudoku.app/" />
    <meta property="og:image" content="https://expertsudoku.app/og-image.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="ExpertSudoku — one grid a day. Pick your pain. MediumSudoku, ExpertSudoku, HellSudoku." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ExpertSudoku — one grid a day" />
    <meta name="twitter:description" content="One sudoku a day in three difficulties - Medium, Expert and Hell. Play in the browser or as a Discord Activity with live shared progress and streaks." />
    <meta name="twitter:image" content="https://expertsudoku.app/og-image.png" />
    <title>ExpertSudoku — one grid a day</title>
    <style>/* pre-hydration backdrop, theme class set by the script below */ html { background: #1b1b1e; } html.light { background: #f4f4f5; }</style>
    <script>
      // Mirror of src/lib/theme.js's effective-theme logic, run before first
      // paint so the page never flashes the wrong theme.
      try {
        var pref = localStorage.getItem('expertsudoku-theme');
        var param = new URLSearchParams(location.search).get('theme');
        if (param === 'light' || param === 'dark' || param === 'auto') pref = param;
        if (pref !== 'light' && pref !== 'dark') pref = 'auto';
        var dark = pref === 'dark' || (pref === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(dark ? 'dark' : 'light');
      } catch (e) {}
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
