    <rect x="63" y="11" width="22" height="22" rx="5" fill="#2f2f2f" />
    <rect x="11" y="37" width="22" height="22" rx="5" fill="#2f2f2f" />
    <rect x="37" y="37" width="22" height="22" rx="5" fill="#f0b232" />
    <rect x="63" y="37" width="22" height="22" rx="5" fill="#2f2f2f" />
    <rect x="11" y="63" width="22" height="22" rx="5" fill="#2f2f2f" />
    <rect x="37" y="63" width="22" height="22" rx="5" fill="#2f2f2f" />
    <rect x="63" y="63" width="22" height="22" rx="5" fill="#f23f43" />
